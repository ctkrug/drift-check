name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }} binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >-
          go build -trimpath -ldflags="-s -w"
          -o dist/drift-check-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/drift-check-${{ matrix.goos }}-${{ matrix.goarch }}
